
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600&display=swap');
:root{--a:#E05A33;--brk:#1D9E75;--bg:#0C0C0F;--sf:#16161A;--sf2:#1E1E24;--bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.1);--t1:#E8E6E1;--t2:#8A8A8D;--t3:#55555A;--adim:rgba(224,90,51,0.15);--aglow:rgba(224,90,51,0.25)}
*{box-sizing:border-box;margin:0;padding:0}
.app{max-width:400px;margin:0 auto;font-family:'Outfit',sans-serif;color:var(--t1);background:var(--bg);border-radius:16px;border:0.5px solid var(--bd);overflow:hidden}
.hdr{padding:14px 20px 10px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--bd)}
.hdr img{width:32px;height:32px;border-radius:8px}
.hdr-txt{font-size:14px;font-weight:500;color:var(--t2)}.hdr-txt span{color:var(--t1);font-weight:600}
.hdr-right{margin-left:auto;display:flex;gap:6px}
.hdr-btn{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;color:var(--t3);cursor:pointer;font-size:12px}
.lang-btn{font-size:10px;padding:3px 8px;border-radius:12px;border:0.5px solid var(--bd);background:var(--sf);color:var(--t2);cursor:pointer;font-family:'Outfit',sans-serif}
.lang-btn.active{border-color:var(--a);color:var(--t1);background:var(--adim)}

.timer-sec{text-align:center;padding:1.5rem 1.25rem}
.mode-tabs{display:flex;gap:4px;justify-content:center;margin-bottom:1.5rem;background:var(--sf);border-radius:10px;padding:3px}
.mtab{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:transparent;transition:all 0.2s;font-family:'Outfit',sans-serif}
.mtab.on{background:var(--a);color:#fff}.mtab.on.brk{background:var(--brk)}
.ring-wrap{position:relative;width:200px;height:200px;margin:0 auto 1.5rem}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--sf2);stroke-width:4}.ring-fg{fill:none;stroke:var(--a);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.3s}
.ring-fg.brk{stroke:var(--brk)}
.tdisp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ttime{font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;letter-spacing:-2px;line-height:1}
.tlbl{font-size:10px;color:var(--t2);margin-top:4px;text-transform:uppercase;letter-spacing:1.5px}
.ctrls{display:flex;align-items:center;justify-content:center;gap:14px}
.cbtn{width:36px;height:36px;border-radius:50%;border:0.5px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:14px;transition:all 0.15s}
.cbtn:hover{border-color:var(--a);color:var(--t1)}
.pbtn{width:50px;height:50px;border-radius:50%;border:none;background:var(--a);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.pbtn:hover{transform:scale(1.05)}.pbtn:active{transform:scale(0.97)}.pbtn.brk{background:var(--brk)}
.dots{display:flex;gap:6px;justify-content:center;margin:1.5rem 0 0}
.dot{width:8px;height:8px;border-radius:50%;background:var(--sf2);transition:background 0.3s}
.dot.done{background:var(--a)}.dot.cur{background:var(--a);box-shadow:0 0 8px var(--aglow)}
.div{height:0.5px;background:var(--bd);margin:0 20px}

.contrib{padding:16px 20px}
.contrib-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.contrib-ttl{font-size:11px;color:var(--t2);font-weight:500}
.contrib-num{font-size:11px;color:var(--t3)}.contrib-num b{color:var(--a);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(26,1fr);gap:2px}
.gc{aspect-ratio:1;border-radius:2px;background:var(--sf2)}.gc.l1{background:var(--adim)}.gc.l2{background:rgba(224,90,51,0.35)}.gc.l3{background:rgba(224,90,51,0.55)}.gc.l4{background:var(--a)}
.legend{display:flex;gap:4px;justify-content:flex-end;margin-top:6px;font-size:9px;color:var(--t3);align-items:center}
.lc{width:8px;height:8px;border-radius:2px}

.tbar{margin:16px 20px;padding:8px 14px;background:var(--sf);border-radius:10px;border:0.5px solid var(--bd);display:flex;align-items:center;gap:8px}
.tb-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.tb-ico{width:18px;height:18px;border-radius:4px;overflow:hidden}.tb-ico img{width:100%;height:100%}
.tb-time{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--t1)}
.tb-bar{flex:1;height:3px;background:var(--sf2);border-radius:2px;overflow:hidden}
.tb-fill{height:100%;background:var(--a);border-radius:2px;transition:width 1s linear}

.themes{display:flex;gap:5px;padding:0 20px;margin:12px 0 16px}
.tpill{padding:4px 10px;border-radius:16px;font-size:10px;border:0.5px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif}
.tpill.on{border-color:var(--a);color:var(--t1);background:var(--adim)}
</style>

<script>
const L={ru:{tabs:['Фокус','Короткий','Длинный'],labels:['фокус','короткий перерыв','длинный перерыв'],tray:'Трей',act:'Активность — 6 месяцев',pomo:'помидоров',less:'меньше',more:'больше',themes:['Томат','Океан','Лес','Фиалка'],title:'Помидор',brand:'Мемора'},en:{tabs:['Focus','Short break','Long break'],labels:['focus','short break','long break'],tray:'Tray',act:'Activity — 6 months',pomo:'pomodoros',less:'less',more:'more',themes:['Tomato','Ocean','Forest','Violet'],title:'Pomodoro',brand:'Memora'}};
let lang='ru';
function setLang(l){lang=l;const d=L[l];document.getElementById('tab0').textContent=d.tabs[0];document.getElementById('tab1').textContent=d.tabs[1];document.getElementById('tab2').textContent=d.tabs[2];const mi={work:0,short:1,long:2};document.getElementById('tlbl').textContent=d.labels[mi[currentMode]];document.getElementById('trayLbl').textContent=d.tray;document.getElementById('cttl').textContent=d.act;document.getElementById('cpomolbl').textContent=d.pomo;document.getElementById('legLess').textContent=d.less;document.getElementById('legMore').textContent=d.more;document.querySelectorAll('.tpill').forEach((p,i)=>p.textContent=d.themes[i]);document.querySelector('.hdr-txt').innerHTML='<span>'+d.brand+'</span> '+d.title;document.getElementById('lru').classList.toggle('active',l==='ru');document.getElementById('len').classList.toggle('active',l==='en');}

const MODES={work:{time:25*60},short:{time:5*60},long:{time:15*60}};
let currentMode='work',timeLeft=25*60,totalTime=25*60,running=false,interval=null,completedPomos=0;
const CIRC=2*Math.PI*90;
function renderDots(){const el=document.getElementById('dots');let h='';for(let i=0;i<4;i++){let c='dot';if(i<completedPomos%4)c+=' done';else if(i===completedPomos%4&&currentMode==='work')c+=' cur';h+='<div class="'+c+'"></div>';}el.innerHTML=h;}
function buildGrid(){const g=document.getElementById('grid');let h='';for(let w=0;w<26;w++)for(let d=0;d<7;d++){const r=Math.random();let c='';if(r>0.75)c='l4';else if(r>0.55)c='l3';else if(r>0.35)c='l2';else if(r>0.2)c='l1';h+='<div class="gc '+c+'"></div>';}g.innerHTML=h;}
function updateDisp(){const m=Math.floor(timeLeft/60),s=timeLeft%60;const str=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');document.getElementById('ttime').textContent=str;document.getElementById('tbTime').textContent=str;const pct=timeLeft/totalTime;document.getElementById('ringFg').style.strokeDashoffset=CIRC*(1-pct);document.getElementById('tbFill').style.width=(pct*100)+'%';}
function setMode(mode){currentMode=mode;timeLeft=MODES[mode].time;totalTime=MODES[mode].time;running=false;clearInterval(interval);const mi={work:0,short:1,long:2};document.getElementById('tlbl').textContent=L[lang].labels[mi[mode]];document.getElementById('playBtn').innerHTML='&#9654;';document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('on','brk'));const idx=mode==='work'?0:mode==='short'?1:2;const t=document.querySelectorAll('.mtab')[idx];t.classList.add('on');if(mode!=='work')t.classList.add('brk');document.getElementById('ringFg').classList.toggle('brk',mode!=='work');document.getElementById('playBtn').classList.toggle('brk',mode!=='work');updateDisp();renderDots();}
function toggleTimer(){if(running){running=false;clearInterval(interval);document.getElementById('playBtn').innerHTML='&#9654;';}else{running=true;document.getElementById('playBtn').innerHTML='&#10074;&#10074;';interval=setInterval(()=>{if(timeLeft>0){timeLeft--;updateDisp();}else{clearInterval(interval);running=false;document.getElementById('playBtn').innerHTML='&#9654;';if(currentMode==='work'){completedPomos++;document.getElementById('cpomo').textContent=47+completedPomos;completedPomos%4===0?setMode('long'):setMode('short');}else setMode('work');}},1000);}}
function resetTimer(){running=false;clearInterval(interval);timeLeft=totalTime;document.getElementById('playBtn').innerHTML='&#9654;';updateDisp();}
function skipTimer(){clearInterval(interval);running=false;if(currentMode==='work'){completedPomos++;document.getElementById('cpomo').textContent=47+completedPomos;completedPomos%4===0?setMode('long'):setMode('short');}else setMode('work');}
function setTheme(el,hex){document.documentElement.style.setProperty('--a',hex);document.documentElement.style.setProperty('--adim',hex.replace('#','')+'26');document.querySelectorAll('.tpill').forEach(p=>p.classList.remove('on'));el.classList.add('on');buildGrid();}
function toggleTheme(){const pills=document.querySelectorAll('.tpill');const colors=['#E05A33','#378ADD','#1D9E75','#7F77DD'];let ci=0;pills.forEach((p,i)=>{if(p.classList.contains('on'))ci=i;});const ni=(ci+1)%4;pills.forEach(p=>p.classList.remove('on'));pills[ni].classList.add('on');setTheme(pills[ni],colors[ni]);}
renderDots();buildGrid();updateDisp();
</script>
