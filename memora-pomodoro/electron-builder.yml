appId: pro.armk.memora-pomodoro
productName: Memora Pomodoro
copyright: Copyright © 2026 Memora Solutions

# Stable, version-less artifact name so the site can link a permanent
# "latest/download/Memora-Pomodoro-Setup.exe" URL across releases.
artifactName: Memora-Pomodoro-Setup.${ext}
# Squeeze the installer harder (text/binaries compress well).
compression: maximum
# Strip unused Chromium UI locales (~40MB) after packaging.
afterPack: scripts/afterPack.cjs

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*

extraResources:
  - from: assets
    to: assets
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  license: resources/license.txt
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Memora Pomodoro

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.png
  category: public.app-category.productivity

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: assets/icon.png
  category: Utility

publish:
  provider: github
  owner: arar228
  repo: memora-solutions
